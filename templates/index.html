<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 28, 45, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Abstract Background Elements */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.4);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.3);
            bottom: -200px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
        }

        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dashboard-container {
            padding: 2.5rem 5%;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .refresh-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Highlight bar at top of cards */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        /* Metrics grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .metric-card h3 {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Chart container */
        .charts-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 15, 25, 0.8);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .header-section { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .refresh-btn { align-self: flex-start; }
            .metric-value { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Background Design -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6"/>
                        <stop offset="100%" stop-color="#8b5cf6"/>
                    </linearGradient>
                </defs>
                <path d="M2 12h4l3-9 5 18 3-9h5"/>
            </svg>
            Reportes 
        </div>
    </header>

    <main class="dashboard-container">
        
        <div class="header-section">
            <div>
                <h1>Dashboard de Consumo</h1>
                <p class="subtitle">Evaluación en tiempo real de análisis de consumo Métrica por Área.</p>
            </div>
            <button class="refresh-btn" onclick="fetchData()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                    <path d="M3 21v-5h5"/>
                </svg>
                Actualizar Datos
            </button>
        </div>

        <div class="metrics-grid">
            <div class="glass-card metric-card">
                <h3>Consumo Total Global</h3>
                <div class="metric-value" id="totalConsumption">0</div>
            </div>
            <div class="glass-card metric-card">
                <h3>Costo Total Estimado</h3>
                <div class="metric-value" id="totalCost">$0.00</div>
            </div>
            <div class="glass-card metric-card">
                <h3>Áreas Monitoreadas</h3>
                <div class="metric-value" id="areasCount">0</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="glass-card">
                <div class="loading-overlay" id="loadingOverlay1">
                    <div class="spinner"></div>
                </div>
                <h3>Consumo por Área (Unidades)</h3>
                <div class="chart-wrapper">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <div class="glass-card">
                <div class="loading-overlay" id="loadingOverlay2">
                    <div class="spinner"></div>
                </div>
                <h3>Distribución de Costos</h3>
                <div class="chart-wrapper">
                    <canvas id="doughnutChart"></canvas>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Chart configuration with dark theme
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Inter', sans-serif";
        
        let barChartInst = null;
        let doughnutChartInst = null;

        const bgColors = [
            'rgba(59, 130, 246, 0.8)',
            'rgba(139, 92, 246, 0.8)',
            'rgba(236, 72, 153, 0.8)',
            'rgba(244, 63, 94, 0.8)',
            'rgba(245, 158, 11, 0.8)',
            'rgba(16, 185, 129, 0.8)',
            'rgba(6, 182, 212, 0.8)'
        ];

        async function fetchData() {
            try {
                // Show Loaders
                document.getElementById('loadingOverlay1').classList.add('active');
                document.getElementById('loadingOverlay2').classList.add('active');

                const response = await fetch('/api/reports/consumption-by-area/');
                const json = await response.json();
                
                if (json.status === 'success') {
                    updateDashboard(json.data);
                } else {
                    console.error("Error obtaining data", json);
                }
            } catch (err) {
                console.error("Fetch error:", err);
            } finally {
                // Hide Loaders
                document.getElementById('loadingOverlay1').classList.remove('active');
                document.getElementById('loadingOverlay2').classList.remove('active');
            }
        }

        function updateDashboard(data) {
            let totalCons = 0;
            let totalCost = 0;
            const labels = [];
            const consumptionData = [];
            const costData = [];

            data.forEach(item => {
                const consum = parseFloat(item.total_consumption || 0);
                const cost = parseFloat(item.total_cost || 0);

                totalCons += consum;
                totalCost += cost;

                labels.push(item.area__name || 'Desconocida');
                consumptionData.push(consum);
                costData.push(cost);
            });

            // Format global metrics
            document.getElementById('totalConsumption').innerText = totalCons.toLocaleString('en-US', {maximumFractionDigits:0});
            document.getElementById('totalCost').innerText = '$' + totalCost.toLocaleString('en-US', {maximumFractionDigits:2});
            document.getElementById('areasCount').innerText = data.length;

            // Render Charts
            renderBarChart(labels, consumptionData);
            renderDoughnutChart(labels, costData);
        }

        function renderBarChart(labels, dataset) {
            const ctx = document.getElementById('barChart').getContext('2d');
            
            if (barChartInst) {
                barChartInst.data.labels = labels;
                barChartInst.data.datasets[0].data = dataset;
                barChartInst.update();
                return;
            }

            barChartInst = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Consumo (Unidades)',
                        data: dataset,
                        backgroundColor: 'rgba(59, 130, 246, 0.7)',
                        borderColor: 'rgb(59, 130, 246)',
                        borderWidth: 1,
                        borderRadius: 6,
                        hoverBackgroundColor: 'rgba(139, 92, 246, 0.9)',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    },
                    animation: {
                        duration: 1500,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        function renderDoughnutChart(labels, dataset) {
            const ctx = document.getElementById('doughnutChart').getContext('2d');
            
            if (doughnutChartInst) {
                doughnutChartInst.data.labels = labels;
                doughnutChartInst.data.datasets[0].data = dataset;
                doughnutChartInst.update();
                return;
            }

            doughnutChartInst = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataset,
                        backgroundColor: bgColors,
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { padding: 20, usePointStyle: true, pointStyle: 'circle' }
                        }
                    },
                    animation: {
                        duration: 1500,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        // Fetch initially
        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
        });

    </script>
</body>
</html>
